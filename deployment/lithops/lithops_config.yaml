lithops:
  backend: aws_lambda
  storage: aws_s3

aws:
  region: us-west-2  # Must match NASA DAAC S3 region

aws_lambda:
  execution_role: arn:aws:iam::ACCOUNT:role/lithops-execution
  runtime: ar-worker-arm64
  architecture: arm64
  runtime_memory: 2048   # 2 GB — ensures a full vCPU core
  runtime_timeout: 900   # 15 minutes max
  max_workers: 1500

aws_s3:
  bucket: antarctic-ar-lithops
